name: Publish Package

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (workspace member name, e.g. spakky-saga)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (build only, do not publish)'
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write

jobs:
  publish:
    name: Publish ${{ inputs.package }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Validate package against workspace members
        run: |
          uv run python - <<'EOF'
          import os
          import sys
          import tomllib
          from pathlib import Path

          pkg = os.environ["INPUT_PACKAGE"]
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          members = data["tool"]["uv"]["workspace"]["members"]
          names = sorted(Path(m).name for m in members)
          if pkg not in names:
              print(f"::error::'{pkg}' is not a workspace member.")
              print("Available packages:")
              for n in names:
                  print(f"  - {n}")
              sys.exit(1)
          print(f"OK: '{pkg}' is a valid workspace member.")
          EOF
        env:
          INPUT_PACKAGE: ${{ inputs.package }}

      - name: Install dependencies
        run: uv sync

      - name: Build package
        run: uv build --package ${{ inputs.package }}

      - name: Show build artifacts
        run: ls -la dist/

      - name: Publish to PyPI (OIDC)
        if: ${{ !inputs.dry_run }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true

      - name: Summary
        run: |
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            echo "🧪 Dry run complete for ${{ inputs.package }} - package was built but not published"
          else
            echo "✅ Published ${{ inputs.package }} to PyPI"
          fi

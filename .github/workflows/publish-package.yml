name: Publish Package

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        type: choice
        options:
          - spakky
          - spakky-domain
          - spakky-event
          - spakky-data
          - spakky-task
          - spakky-outbox
          - spakky-logging
          - spakky-fastapi
          - spakky-rabbitmq
          - spakky-security
          - spakky-typer
          - spakky-kafka
          - spakky-sqlalchemy
          - spakky-celery
      dry_run:
        description: 'Dry run (build only, do not publish)'
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write

jobs:
  publish:
    name: Publish ${{ inputs.package }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Build package
        run: uv build --package ${{ inputs.package }}

      - name: Show build artifacts
        run: ls -la dist/

      - name: Publish to PyPI (OIDC)
        if: ${{ !inputs.dry_run }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true

      - name: Summary
        run: |
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            echo "🧪 Dry run complete for ${{ inputs.package }} - package was built but not published"
          else
            echo "✅ Published ${{ inputs.package }} to PyPI"
          fi

event-driven = [
    "spakky[events-rabbitmq]>=6.5.0",
    "spakky[events-kafka]>=6.5.0",
    "spakky[events-outbox-sqlalchemy]>=6.5.0",
]
worker = [
    "spakky-task>=6.6.1",
    "spakky[celery]>=6.5.0",
]
security = [
    "spakky-auth>=6.6.1",
    "spakky[cryptography]>=6.5.0",
    "spakky[oidc]>=6.5.0",

actuator = ["spakky-actuator>=6.6.1"]
cache-core = ["spakky-cache>=6.6.1"]
tracing = ["spakky-tracing>=6.6.1"]
outbox = ["spakky-outbox>=6.6.1"]
auth = ["spakky-auth>=6.6.1"]
logging = ["spakky-logging>=6.6.1"]
cryptography = ["spakky-cryptography>=6.6.1"]
oidc = ["spakky-oidc>=6.6.1"]
policy = ["spakky-policy>=6.6.1"]
openfga = ["spakky-openfga>=6.6.1"]
fastapi = ["spakky-fastapi>=6.6.1"]
typer = ["spakky-typer>=6.6.1"]
rabbitmq = ["spakky-rabbitmq>=6.6.1"]
kafka = ["spakky-kafka>=6.6.1"]
sqlalchemy = ["spakky-sqlalchemy>=6.6.1"]
celery = ["spakky-celery>=6.6.1"]
opentelemetry = ["spakky-opentelemetry>=6.6.1"]
grpc = ["spakky-grpc>=6.6.1"]
redis = ["spakky-redis>=6.6.1"]
vllm = ["spakky-vllm>=6.6.1"]
saga = ["spakky-saga>=6.6.1"]
web = [
    "spakky[fastapi]>=6.5.0",
    "spakky[logging]>=6.5.0",
]
cli = [

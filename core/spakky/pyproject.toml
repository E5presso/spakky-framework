full = [
    "spakky-actuator>=6.6.1",
    "spakky-agent>=6.6.1",
    "spakky-auth>=6.6.1",
    "spakky-cache>=6.6.1",
    "spakky-data>=6.6.1",
    "spakky-domain>=6.6.1",
    "spakky-event>=6.6.1",
    "spakky-outbox>=6.6.1",

repos:
  - repo: local
    hooks:
      - id: python-harness-rules
        name: Validate Python harness rules
        entry: uv run python .agents/skills/check/scripts/validate_python_harness.py core plugins .agents scripts
        language: system
        pass_filenames: false
        always_run: true
        verbose: true
        stages: [pre-commit]

      - id: monorepo-pre-commit
        name: Run pre-commit on changed sub-projects
        entry: uv run python scripts/run_subproject_precommit.py
        language: system
        pass_filenames: false
        always_run: true
        verbose: true
        stages: [pre-commit]

      - id: monorepo-pre-push-tests
        name: Run tests on changed sub-projects
        entry: uv run python scripts/run_subproject_prepush.py
        language: system
        pass_filenames: false
        always_run: true
        verbose: true
        stages: [pre-push]

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.1.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: check-yaml
        args: ['--unsafe']
      - id: check-json
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        types_or: [python, pyi]
        args: [--fix]
      - id: ruff-format
        types_or: [python, pyi]
  - repo: local
    hooks:
      - id: pyrefly-typecheck
        name: Pyrefly (type checking)
        entry: bash -c 'if [ -d "plugins/spakky-fastapi" ]; then cd plugins/spakky-fastapi; fi && uv run pyrefly check'
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: pytest
        name: Run pytest
        entry: bash -c 'if [ -d "plugins/spakky-fastapi" ]; then cd plugins/spakky-fastapi; fi && uv run pytest'
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        stages: [pre-push]
